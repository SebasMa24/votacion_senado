spring.application.name=votacion_senado

spring.jackson.time-zone=America/Bogota

#Database properties
server.port=${APPLICATION_PORT:8080}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sistema_votacion}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}

spring.output.ansi.enabled=always

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=false
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

logging.level.org.springframework.cache=DEBUG

spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=REMOVED_SENDGRID_KEY
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Límite máximo de subida
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB