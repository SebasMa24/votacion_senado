spring.application.name=votacion_senado

spring.jackson.time-zone=America/Bogota

#Database properties
server.port=${APPLICATION_PORT:8080}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sistema_votacion}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}

spring.output.ansi.enabled=always

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=false
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

logging.level.org.springframework.cache=DEBUG

# Límite máximo de subida
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB